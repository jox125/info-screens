<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Screens</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/race-control.css">
    <style>
      .menu {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .menu-link {
        box-shadow: inset 0px 1px 0px 0px #ffffff;
        background: linear-gradient(to bottom, #f9f9f9 5%, #e9e9e9 100%);
        background-color: #f9f9f9;
        border-radius: 10px;
        border: 1px solid #dcdcdc;
        display: inline-block;
        cursor: pointer;
        color: #666666;
        font-family: Arial;
        font-size: 13px;
        font-weight: bold;
        padding: 10px 12px;
        text-decoration: none;
        text-shadow: 0px 1px 0px #ffffff;
      }

      .menu-link:hover {
        background: linear-gradient(to bottom, #e9e9e9 5%, #f9f9f9 100%);
        background-color: #e9e9e9;
      }

      .menu-link:active {
        position: relative;
        top: 1px;
      }
    </style>
  </head>
  <body>
    <div class="interface-content">
      <div class="panel">
        <div class="panel-header">
          <h2>Info Screens</h2>
        </div>
        <div class="menu">
          <a class="menu-link" href="/front-desk">Front Desk</a>
          <a class="menu-link" href="/race-control">Race Control</a>
          <a class="menu-link" href="/lap-line-tracker">Lap Line Tracker</a>
          <a class="menu-link" href="/leader-board">Leader Board</a>
          <a class="menu-link" href="/next-race">Next Race</a>
          <a class="menu-link" href="/race-countdown">Race Countdown</a>
          <a class="menu-link" href="/race-flags">Race Flags</a>
        </div>
      </div>
    </div>
  </body>
</html>
