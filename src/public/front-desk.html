<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Desk</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/front-desk.css">
</head>
<body>
    <div class="interface-content">
      <div id="login-panel" class="login-panel">
        <h2 class="panel-title">Front Desk</h2>
        <form id="login-form" class="login-form">
          <input
            type="text"
            id="login-key"
            placeholder="Please enter key"
          >
          <button type="submit">Login</button>
          <p id="login-feedback" class="error-message hidden"></p>
        </form>
      </div>


      <div id="session-panel" class="session-panel hidden">
        <div class="panel-header">
          <h2 class="panel-title">Race Sessions</h2>
          <form id="add-session-form" class="add-form">
            <input
              type="text"
              id="session-name"
              placeholder="New session name"
            >
            <button type="submit">+ Add Session</button>
            <p id="session-feedback" class="hidden"></p>
          </form>
        </div>
        <div id="session-list" class="list-container"></div>
      </div>


      <div id="driver-panel" class="driver-panel hidden">
        <div class="panel-header">
          <h2 class="panel-title">Drivers</h2>
          <button id="driver-panel-close">X</button>
          <form id="add-driver-form" class="add-form">
            <input
              type="text"
              id="driver-name"
              placeholder="New driver name"
            >
            <button type="submit">+ Add Driver</button>
            <p id="driver-feedback" class="hidden"></p>
          </form>
        </div>
        <div id="driver-list" class="list-container"></div>
      </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/front-desk.js"></script>
</body>
</html>
