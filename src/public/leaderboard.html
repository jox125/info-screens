<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Leaderboard</title>
    <link rel="stylesheet" href="css/leaderboard.css">
</head>
<body>

<div class="background-container"></div>

<div class="leaderboard-container">

    <div class="leaderboard-header">
        <div id="flag-status" class="flag-indicator flag-safe">WAITING</div>
        <div class="timer-group">
            <div class="timer-label">SESSION TIME</div>
            <div id="race-timer" class="race-timer">00:00:000s</div>
        </div>
    </div>

    <h2 id="session-name">Waiting for Race Control...</h2>

    <table class="leaderboard-table">
        <thead>
        <tr>
            <th class="pos-col">#</th>
            <th class="car-col">CAR</th>
            <th class="driver-col">DRIVER</th>
            <th class="laps-col">LAPS</th>
            <th class="time-col">FASTEST LAP</th>
        </tr>
        </thead>
        <tbody id="leaderboard-body">
        </tbody>
    </table>
</div>

<button id="fs-btn">⛶ Full Screen</button>

<script src="/socket.io/socket.io.js"></script>
<script src="js/leaderboard.js"></script>
</body>
</html>
